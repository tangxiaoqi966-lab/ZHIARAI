version: '3.8'

services:
  # Supabase 数据库
  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supabase_platform_admin}
      POSTGRES_DB: supabase_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-platform.sql:/docker-entrypoint-initdb.d/01-platform.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform_network

  # 管理后台后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: supabase_platform
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-supabase_platform_admin}
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-key-change-this}
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    networks:
      - platform_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {if (r.statusCode === 200) process.exit(0); else process.exit(1)}).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 管理后台前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - platform_network
    restart: unless-stopped

  # Nginx反向代理（可选，如果前端不直接暴露）
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    ports:
      - "443:443"
      - "80:80"
    networks:
      - platform_network
    restart: unless-stopped

networks:
  platform_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local