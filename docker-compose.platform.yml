
version: '3'

volumes:
  platform-data:

services:
  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--certificatesresolvers.selfsigned.acme.tlsChallenge=true"
      - "--certificatesresolvers.selfsigned.acme.email=admin@localhost"
      - "--certificatesresolvers.selfsigned.acme.storage=/data/acme.json"
    ports:
      - "8085:80"
      - "8086:8080"
      - "8444:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - platform-data:/data

  platform-backend:
    build: ./platform-backend
    ports:
      - "3002:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - platform-data:/data
    environment:
      - API_AUTH_ENABLED=${API_AUTH_ENABLED:-true}
      - API_KEY=${API_KEY:-supabase-platform-secret-key-change-in-production}
      - PORT=3001
    # resources:
    #   limits:
    #     cpus: '0.5'
    #     memory: 512M
    #   reservations:
    #     cpus: '0.1'
    #     memory: 128M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.localhost`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.tls.certresolver=selfsigned"
      - "traefik.http.services.backend.loadbalancer.server.port=3001"

  platform-dashboard:
    build: ./platform-dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_KEY=${API_KEY:-supabase-platform-secret-key-change-in-production}
      - NEXT_PUBLIC_API_URL=http://localhost:3002
    # resources:
    #   limits:
    #     cpus: '0.3'
    #     memory: 256M
    #   reservations:
    #     cpus: '0.05'
    #     memory: 64M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`dashboard.localhost`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=selfsigned"
      - "traefik.http.services.dashboard.loadbalancer.server.port=3000"
